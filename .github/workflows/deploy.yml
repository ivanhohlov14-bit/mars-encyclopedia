name: Build and deploy MkDocs site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Если requirements.txt есть — установим зависимости
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install mkdocs; fi

      - name: Build site
        run: mkdocs build --verbose

      # Загружаем артефакт с уникальным именем
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-artifact
          path: site/
          retention-days: 1   # артефакт хранится недолго, чтобы не засорять

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact-name: site-artifact   # указываем имя артефакта, который мы загрузили
