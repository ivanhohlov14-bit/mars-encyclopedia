site_name: Марсианская энциклопедия
site_url: https://ivanhohlov14-bit.github.io/mars-wiki/
site_favicon: assets/favicon.png

theme:
  name: readthedocs
  language: ru
  logo: assets/logo.png
  toc: true
  
plugins:
  - search
  - roamlinks

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - footnotes

