site_name: Марсианская энциклопедия
site_url: https://mars-wiki.ru/
site_favicon: assets/favicon.png

theme:
  name: material
  language: ru
  logo: assets/logo.png
  favicon: assets/favicon.png
  toc: true
  sticky_navigation: true  
  
  features:
    - content.tabs.link
    - navigation.sections
    - toc.follow
    - navigation.tabs.sticky
    - navigation.expand
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - footnotes

extra_javascript:
  - javascripts/fix-title.js

extra_css:
  - stylesheets/extra.css

