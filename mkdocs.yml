site_name: Марсианская энциклопедия
site_url: https://ivanhohlov14-bit.github.io/mars-wiki/
site_favicon: assets/favicon.png

theme:
  name: readthedocs
  language: ru
  logo: assets/logo.png
  toc: true

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - footnotes

nav:
  - Главная: index.md
  - История:
      - Периодизация: history/periodization.md
      - Хронология: history/timeline.md
      - Мифы: history/myths.md
  - География:
      - Ацидалийское море: geography/acidalia-sea.md
      - Окхасен: geography/okhasen.md
      - Роген-Ария: geography/rogen-aria.md
  - Астрономия:
      - Звёздное небо Марса: astronomy/mars-sky.md
  - Персонажи:
      - Хевсур: people/hevsur.md
      - Талин: people/talin.md
      - Элла: people/ella.md
  - Книги:
      - Ацидалийское море: books/acidalia-sea.md
      - Переводчик: translator.md
      - Лицензия: license.md 
extra_css:
  - stylesheets/extra.css
